# Build-from-source overlay (for contributors / local development).
#
# The default docker-compose.yml pulls prebuilt GHCR images. Layer this file on
# top to build the api and frontend from the local source tree instead:
#
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
#
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile

  # Mock Moonraker + Spoolman printer for testing the send/print/spoolman flow
  # without hardware. Opt-in: add `--profile mock` to the build command above.
  # Register a printer at http://mock-printer:7125 (Spoolman: .../spoolman).
  mock-printer:
    image: python:3.11-slim
    container_name: printstash-mock-printer
    restart: unless-stopped
    profiles:
      - mock
    ports:
      - "7125:7125"
    volumes:
      - ./backend/tests/e2e/fakes/mock_printer.py:/app/mock_printer.py:ro
    working_dir: /app
    command: >
      sh -c "pip install --quiet fastapi uvicorn python-multipart &&
             python mock_printer.py --host 0.0.0.0 --port 7125 --print-seconds ${MOCK_PRINT_SECONDS:-30}"
    networks:
      - printstash_net
