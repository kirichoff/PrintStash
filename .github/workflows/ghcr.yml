name: GHCR Release Images

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY: ghcr.io

jobs:
  # The push trigger's tag glob (v*.*.*) also matches non-semver strings like
  # "vfoo.bar.baz" — this is the strict check. Applies to workflow_dispatch
  # too, so a manual run against a branch ref can't slip past it either.
  guard:
    name: Validate tag is strict semver
    runs-on: ubuntu-latest
    steps:
      - name: Check ${{ github.ref_name }}
        run: |
          if [[ ! "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::ref '${{ github.ref_name }}' is not a strict semver tag (vX.Y.Z)"
            exit 1
          fi

  # Re-run the full CI suite against the tagged commit. A tag that fails tests
  # must never reach the registry — this gates the publish job below.
  ci:
    needs: guard
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish ${{ matrix.image }}
    needs: [guard, ci]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: printstash-api
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - image: printstash-frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=tag

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
