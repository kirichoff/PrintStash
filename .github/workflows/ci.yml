name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: uv sync --extra dev --frozen

      - name: Lint backend
        run: uv run ruff check app/ tests/

      - name: Test backend
        run: uv run pytest tests -v

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Typecheck frontend
        run: pnpm exec tsc --noEmit

      - name: Lint frontend
        run: pnpm lint

      - name: Unit test frontend
        run: pnpm test

      - name: Build frontend
        run: pnpm build

      - name: Test frontend in browser
        run: pnpm test:e2e

  e2e-real:
    name: Real-backend E2E
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      # Backend: the real e2e suite boots uvicorn against a throwaway SQLite DB.
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --extra dev --frozen

      # Frontend: serves a Vite dev server + drives Playwright.
      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Real-backend E2E
        working-directory: frontend
        run: pnpm test:e2e:real

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-real
          path: frontend/playwright-report/
          retention-days: 7

  docker-build:
    name: Docker build (${{ matrix.image }})
    runs-on: ubuntu-latest
    # Catch arm64 build breakage before it reaches a release tag. Builds both
    # published platforms but never pushes — the release workflows publish.
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: printstash-api
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - image: printstash-frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=gha,scope=${{ matrix.image }}
          # ignore-error: a transient GitHub Actions Cache outage (e.g. a 503
          # while exporting) should not fail an otherwise-successful build.
          cache-to: type=gha,scope=${{ matrix.image }},mode=max,ignore-error=true
