# Production deployment (hardened, standalone).
#
# Differences from the default docker-compose.yml:
#   - Only the frontend is published, and it binds to 127.0.0.1 — put a TLS
#     reverse proxy (Caddy, Traefik, nginx, …) in front of it.
#   - The API is NOT published to the host; the frontend proxies /api/v1 to it
#     over the internal network, so it never needs a host port.
#   - Log rotation is capped so a long-running deployment can't fill the disk.
#
# Usage (standalone — do not combine with docker-compose.yml):
#   docker compose -f docker-compose.prod.yml up -d
#
# Set at minimum a strong VAULT_JWT_SECRET in .env (e.g. `openssl rand -hex 32`).
# Pin the release with PRINTSTASH_VERSION (defaults to latest).

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  frontend:
    image: ghcr.io/xiao-villamor/printstash-frontend:${PRINTSTASH_VERSION:-latest}
    container_name: printstash-frontend
    restart: unless-stopped
    logging: *default-logging
    # Bind to localhost only — terminate TLS in a reverse proxy in front of this.
    # If your proxy runs on the same Docker network, you can drop this mapping
    # entirely and reach the service as `frontend:3000`.
    ports:
      - "127.0.0.1:${PRINTSTASH_HTTP_PORT:-3000}:3000"
    environment:
      NGINX_CLIENT_MAX_BODY_SIZE: ${VAULT_MAX_UPLOAD_MB:-512}m
    networks:
      - printstash_net
    depends_on:
      api:
        condition: service_healthy

  api:
    image: ghcr.io/xiao-villamor/printstash-api:${PRINTSTASH_VERSION:-latest}
    container_name: printstash-api
    restart: unless-stopped
    logging: *default-logging
    # No host port: the API is reachable only inside the Docker network, where
    # the frontend proxies /api/v1 (incl. WebSockets) to it.
    expose:
      - "8000"
    environment:
      VAULT_STORAGE_BACKEND: ${VAULT_STORAGE_BACKEND:-local}
      VAULT_DATA_DIR: /data/files
      VAULT_THUMB_DIR: /data/thumbs
      VAULT_STAGING_DIR: /data/staging
      # SQLite on the persistent volume by default. For Postgres, set VAULT_DB_URL
      # here and add a postgres service (see docker-compose.yml for an example).
      VAULT_DB_URL: ${VAULT_DB_URL:-sqlite:////data/db/printstash.sqlite}
      VAULT_BACKUP_DIR: /data/backups
      VAULT_BACKUP_RETENTION_DAYS: ${VAULT_BACKUP_RETENTION_DAYS:-30}
      VAULT_BACKUP_S3_BUCKET: ${VAULT_BACKUP_S3_BUCKET:-}
      VAULT_BACKUP_S3_ENDPOINT_URL: ${VAULT_BACKUP_S3_ENDPOINT_URL:-}
      VAULT_BACKUP_S3_REGION: ${VAULT_BACKUP_S3_REGION:-auto}
      VAULT_BACKUP_S3_ACCESS_KEY: ${VAULT_BACKUP_S3_ACCESS_KEY:-}
      VAULT_BACKUP_S3_SECRET_KEY: ${VAULT_BACKUP_S3_SECRET_KEY:-}
      VAULT_S3_BUCKET: ${VAULT_S3_BUCKET:-}
      VAULT_S3_ENDPOINT_URL: ${VAULT_S3_ENDPOINT_URL:-}
      VAULT_S3_REGION: ${VAULT_S3_REGION:-auto}
      VAULT_S3_ACCESS_KEY: ${VAULT_S3_ACCESS_KEY:-}
      VAULT_S3_SECRET_KEY: ${VAULT_S3_SECRET_KEY:-}
      VAULT_S3_PRESIGNED_URL_EXPIRE_SECONDS: ${VAULT_S3_PRESIGNED_URL_EXPIRE_SECONDS:-900}
      VAULT_S3_MULTIPART_THRESHOLD_MB: ${VAULT_S3_MULTIPART_THRESHOLD_MB:-50}
      VAULT_S3_LIFECYCLE_EXPIRATION_DAYS: ${VAULT_S3_LIFECYCLE_EXPIRATION_DAYS:-0}
      VAULT_S3_LIFECYCLE_TRANSITION_DAYS: ${VAULT_S3_LIFECYCLE_TRANSITION_DAYS:-0}
      VAULT_S3_TRANSITION_STORAGE_CLASS: ${VAULT_S3_TRANSITION_STORAGE_CLASS:-STANDARD_IA}
      VAULT_JWT_SECRET: ${VAULT_JWT_SECRET:?set a strong VAULT_JWT_SECRET in .env}
      VAULT_ACCESS_TOKEN_EXPIRE_MINUTES: ${VAULT_ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      VAULT_MAX_UPLOAD_MB: ${VAULT_MAX_UPLOAD_MB:-512}
      VAULT_LOG_LEVEL: ${VAULT_LOG_LEVEL:-INFO}
      TZ: UTC
    volumes:
      - printstash_data:/data/files
      - printstash_thumbs:/data/thumbs
      - printstash_db:/data/db
      - printstash_staging:/data/staging
      - printstash_backups:/data/backups
    networks:
      - printstash_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # No migration command needed: the image entrypoint runs DB migrations on
    # every start, then launches the server (the image CMD). Removing or editing
    # this stanza can no longer skip migrations (issue #29).

networks:
  printstash_net:
    driver: bridge

volumes:
  printstash_data:
  printstash_thumbs:
  printstash_db:
  printstash_staging:
  printstash_backups:
