# Serves the Vite-built SPA and proxies the API (incl. WebSockets) to the
# `api` service — replacing the old Next.js rewrites + dev proxy with a single
# same-origin entrypoint, so the browser never needs an absolute API URL.
server {
  listen 3000;
  server_name _;
  client_max_body_size ${NGINX_CLIENT_MAX_BODY_SIZE};

  root /usr/share/nginx/html;
  index index.html;
  include /etc/nginx/security-headers.conf;

  # API + WebSocket proxy. Keep this above the SPA fallback so /api/v1 is never
  # rewritten to index.html.
  location /api/v1/ {
    proxy_pass http://api:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # WebSocket upgrade (printer live status).
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 86400;
  }

  # Content-hashed build assets. A missing asset must 404 — never fall back to
  # index.html, or a browser holding a stale index.html (after a rebuild) gets
  # HTML for a .js request, the bundle fails to parse, and the app never mounts
  # (symptom: page renders but nothing is clickable). Hashed names are safe to
  # cache forever.
  location /assets/ {
    include /etc/nginx/security-headers.conf;
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # ES-module assets (.mjs) — e.g. the pdf.js worker. nginx's default mime map
  # doesn't type .mjs, so it falls back to application/octet-stream, and the
  # browser refuses to start a module worker with the wrong type ("Could not
  # render this PDF"). Force the JS type; keep the hashed-asset 404 + caching.
  location ~* \.mjs$ {
    include /etc/nginx/security-headers.conf;
    default_type application/javascript;
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # SPA history fallback: every other route serves index.html so React Router
  # resolves it client-side. index.html itself must always be revalidated so a
  # redeploy's new asset hashes are picked up immediately.
  location / {
    include /etc/nginx/security-headers.conf;
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }
}
