# Serves the Vite-built SPA and proxies the API (incl. WebSockets) to the
# `api` service — replacing the old Next.js rewrites + dev proxy with a single
# same-origin entrypoint, so the browser never needs an absolute API URL.
server {
  listen 3000;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # API + WebSocket proxy. Keep this above the SPA fallback so /api/v1 is never
  # rewritten to index.html.
  location /api/v1/ {
    proxy_pass http://api:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # WebSocket upgrade (printer live status).
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 86400;
  }

  # SPA history fallback: every non-asset route serves index.html so React
  # Router can resolve it client-side.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
