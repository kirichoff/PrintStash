<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <title>PrintStash · Offline</title>
    <style>
      :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
      body { min-height: 100vh; margin: 0; display: grid; place-items: center; background: Canvas; color: CanvasText; }
      main { max-width: 28rem; padding: 2rem; text-align: center; }
      h1 { font-size: 1.5rem; }
      p { opacity: .72; line-height: 1.5; }
      button { border: 0; border-radius: .375rem; padding: .75rem 1rem; background: #2563eb; color: white; font: inherit; font-weight: 600; }
    </style>
  </head>
  <body>
    <main>
      <h1>PrintStash is offline</h1>
      <p>Cached app screens remain available. Printer and library changes need a connection to your server.</p>
      <button type="button" onclick="location.reload()">Try again</button>
    </main>
  </body>
</html>
